<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMATIONAM | Creative 3D Web Experiences</title>
    <meta name="description" content="A premium 3D creative digital agency and portfolio.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- GSAP for smooth UI animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>
    
    <!-- 3D Canvas Context -->
    <canvas id="webgl-canvas"></canvas>

    <!-- UI Overlay -->
    <div id="app">
        <header class="navbar">
            <div class="logo">ANIMATION<span>AM</span></div>
            <nav>
                <a href="#work" class="nav-link">Work</a>
                <a href="#studio" class="nav-link">Studio</a>
                <a href="#contact" class="nav-link contact-btn">Let's Talk</a>
            </nav>
        </header>

        <main>
            <section class="hero-section">
                <div class="glass-panel">
                    <h1 class="hero-title">Shaping<br><span>Digital</span> Space.</h1>
                    <p class="hero-subtitle">We craft immersive, award-winning 3D web experiences that redefine brand identities.</p>
                    <button class="cta-button">Explore Our Universe</button>
                    
                    <div class="scroll-indicator">
                        <div class="mouse">
                            <div class="wheel"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="content-section" id="work">
                <div class="content-card">
                    <h2>Immersive Dimensions</h2>
                    <p>Elevating the standard of creative development with WebGL, custom shaders, and meticulous animations.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- ES Module Import for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.158.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Main Logic -->
    <script type="module" src="main.js"></script>
</body>
</html>
